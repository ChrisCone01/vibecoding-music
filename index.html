<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SoundDrift</title>
  <!-- Fraunces：高对比文艺衬线，气质接近 Roxierossa -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
  <style>

    /* 本地 Cervanttis 字体（专辑名小字用，纤细手写体） */
    @font-face {
      font-family: 'Cervanttis';
      src: url('assets/fonts/Cervanttis.otf') format('opentype'),
           url('assets/fonts/Cervanttis.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* 爱点风雅黑长体（歌词中文用，商用免费） */
    @font-face {
      font-family: 'AiDianFengYaHei';
      src: url('assets/fonts/AiDianFengYaHei.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      /* 底层：干净的灰色圆形径向渐变（白→灰→黑），未点击前的默认态 */
      background-color: #000000;
      background-image:
        radial-gradient(115% 90% at 50% 104%,
          #f2f2f2 0%,
          #cfcfcf 12%,
          #9a9a9a 26%,
          #5e5e5e 42%,
          #2e2e2e 58%,
          rgba(0, 0, 0, 0) 78%);
    }

    /* 颜色游移层：低饱和度的彩色光晕，缓慢循环色相 →
       渐变带颜色变化，但灰色底主导，整体仍是灰调。 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(115% 90% at 50% 104%,
          rgba(151, 127, 180, 0.7) 0%,
          rgba(116, 109, 160, 0.5) 30%,
          rgba(74, 78, 116, 0.3) 52%,
          rgba(0, 0, 0, 0) 75%);
      mix-blend-mode: soft-light;
      filter: saturate(0.9) hue-rotate(0deg);
      animation: hue-drift 14s linear infinite;
    }

    @keyframes hue-drift {
      to { filter: hue-rotate(360deg); }
    }

    /* 选中卡片时的“主色调”底部光晕层：默认透明，点击后淡入(screen 叠加，
       颜色由 --bloom-c 给，JS 在同色系内缓慢变化)。与 ::before 交叉淡入淡出，无突变。 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(120% 95% at 50% 104%,
          rgba(var(--bloom-c, 151,127,180), 0.95) 0%,
          rgba(var(--bloom-c, 151,127,180), 0.70) 32%,
          rgba(var(--bloom-c, 151,127,180), 0.40) 56%,
          rgba(0, 0, 0, 0) 80%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    body.tinted::after { opacity: 1; }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* 顶部 MV：贴着屏幕顶部、横向撑满两边，藏进黑色渐变里。
       z-index 0：在 body 的彩色光晕(-1)之上、卡片(#stage 默认层)之下。 */
    .mv-top {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 56vh;              /* 只占顶部一带 */
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      /* 四周羽化为透明 → 视频边缘没有硬切，融进黑色。下边羽化最长。 */
      -webkit-mask:
        linear-gradient(to bottom, #000 0%, #000 30%, transparent 92%),
        linear-gradient(to right, transparent 0%, #000 10%, #000 90%, transparent 100%);
      -webkit-mask-composite: source-in;
      mask:
        linear-gradient(to bottom, #000 0%, #000 30%, transparent 92%),
        linear-gradient(to right, transparent 0%, #000 10%, #000 90%, transparent 100%);
      mask-composite: intersect;
    }

    .mv-video, .mv-clip {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      min-width: 100%;           /* 放大撑满两边屏幕，不留切边 */
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* 黑白处理 + 压暗，只隐约可见 */
      filter: grayscale(1) brightness(0.55) contrast(1.05);
    }

    /* 点击后的卡片 MV 覆盖层：默认透明，选中淡入、收回淡出 */
    .mv-clip {
      opacity: 0;
      transition: opacity 0.55s ease;
    }

    /* 暗层：再压一层深色，MV 只透出一点点 */
    .mv-shade {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
    }

    /* 当前行歌词(SplitText 逐字符进场)：居中卡片下方，默认隐藏，点开淡入 */
    #lyric-split {
      position: fixed;
      left: 50%;
      bottom: 7vh;
      transform: translateX(-50%);
      width: 82vw;
      max-width: 1000px;
      text-align: center;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      font-family: 'Fraunces', Georgia, serif;   /* 与歌曲名同字体 */
      font-weight: 600;
      font-size: 30px;
      line-height: 1.3;
      letter-spacing: 0.05em;   /* 整体字间距拉开 5% */
      color: #fff;
      text-shadow: 0 2px 18px rgba(0,0,0,0.347);   /* 投影透明度再降 10% */
    }
    #lyric-split .ls-char {
      display: inline-block;
      white-space: pre;       /* 保留空格 */
      will-change: transform, opacity;
    }
    /* 中文用爱点风雅黑长体，并缩到与英文(Fraunces)视觉等高(方块字同字号偏大，故略缩) */
    #lyric-split .ls-cn {
      font-family: 'AiDianFengYaHei', sans-serif;
      font-size: 0.984em;
      font-weight: 400;
      letter-spacing: 0.1em;   /* 中文字间距比英文再大 5% */
    }

    /* 首页搜索热区：大块透明可点区(好点)，中间用 ::before 画纯白竖线 */
    #search-caret {
      position: fixed;
      left: 50%;
      top: 93vh;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 90px;
      z-index: 40;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #search-caret::before {
      content: '';
      width: 6px;
      height: 34px;
      background: #fff;
    }
    #search-caret.hide { display: none; }   /* 播放页隐藏 */

    /* 搜索模式覆盖层：全屏高斯模糊(背后视频/圆弧仍在动)。
       常驻 DOM，靠 opacity/visibility 过渡 → 模糊随透明度平滑淡入淡出(非硬切)。 */
    #search-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      backdrop-filter: blur(26px) brightness(0.7);
      -webkit-backdrop-filter: blur(26px) brightness(0.7);
      background: rgba(0, 0, 0, 0.18);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.5s ease, visibility 0s linear 0.5s;
    }
    #search-overlay.on {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.5s ease, visibility 0s;
    }

    /* 大字输入框：用歌词字体(Fraunces)，原生白色闪烁光标 */
    #search-input {
      width: 80vw;
      max-width: 1100px;
      background: transparent;
      border: none;
      outline: none;
      text-align: center;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 120px;
      line-height: 1.2;
      color: #fff;
      caret-color: #fff;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.4);
      caret-color: transparent;   /* 隐藏原生光标，用自定义粗光标 */
    }
    #search-input::placeholder { color: rgba(255,255,255,0.25); }

    /* 自定义粗光标(原生 3 倍粗)：跟随文字末尾，闪烁 */
    #search-thickcaret {
      position: fixed;
      width: 18px;                /* 原生约6px → 3倍 */
      background: #fff;
      pointer-events: none;
      display: none;
      animation: thickcaret-blink 1.06s steps(1, end) infinite;
    }
    #search-overlay.on #search-thickcaret { display: block; }
    @keyframes thickcaret-blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
    /* 隐形测量元素：与输入框同字体，用来算文字宽度以定位粗光标 */
    #search-measure {
      position: fixed;
      visibility: hidden;
      white-space: pre;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 120px;
      letter-spacing: 0.02em;
    }

    /* 搜索进度：纯数字百分比 */
    #search-progress {
      margin-top: 40px;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 40px;
      color: rgba(255, 255, 255, 0.85);
      min-height: 48px;
    }

    /* 每张卡的“槽位”：负责扇形定位/旋转/缩放与入场位移，
       透视放这里，内部 .card 的 3D 漂浮才有纵深。
       定位变换在槽位、漂浮变换在内部 .card —— 两者互不干扰。 */
    .card-slot {
      position: absolute;
      width: 384px;          /* 比原始 320 放大 20% */
      transform-origin: center center;
      perspective: 1000px;
      transform-style: preserve-3d;
      will-change: transform;
    }

    /* 悬停层：承载“放大 + 上移 + 跟随鼠标 3D 倾斜”。
       变换原点在底部中心 → 放大时从卡片最下方往上长。 */
    .card-hover {
      position: relative;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .card {
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      transform-style: preserve-3d;
      position: relative;
      cursor: pointer;
      /* 整张卡是一块透红毛玻璃 */
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      /* 弥散柔和投影：两层叠加，透明度减半，扩散更大不僵硬 */
      box-shadow:
        0 80px 150px rgba(0, 0, 0, 0.0875),
        0 62px 40px rgba(0, 0, 0, 0.05);
    }

    /* 沿边框转圈的描边，两端羽化（类似 AE 修剪路径 + 拖尾）。
       悬停时（.hovered）显示并转圈，移走即消失；点击播放（.playing）也显示。 */
    @property --trim-angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    .card.playing::after,
    .card.hovered::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      padding: 2px;                /* 描边粗细 */
      pointer-events: none;
      z-index: 2;
      /* 一段亮线，两端 transparent → 亮 → transparent，即羽化拖尾 */
      /* 描边色由 --trim-rgb 给(默认白)，选中时换成卡片主色调；两端羽化，透明度不变 */
      background: conic-gradient(
        from var(--trim-angle),
        transparent 0%,
        transparent 61%,
        rgba(var(--trim-rgb, 255,255,255), 0.8) 88%,
        rgba(var(--trim-rgb, 255,255,255), 0.36) 93%,
        transparent 98%
      );
      /* 只保留边框那一圈（content-box 与整体做异或，挖空中间） */
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      animation: trim-spin 6.4s linear infinite;
    }

    @keyframes trim-spin {
      to { --trim-angle: 360deg; }
    }

    .card-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      /* 上/左/右贴边无缝，仅底部圆角 → 图片像盖在玻璃上 */
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      /* 鼠标点光源位置(百分比) + 悬停系数 h(0..1，由 JS 喂入) */
      --mx: 50%;
      --my: 50%;
      --h: 0;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 去色变暗层：backdrop-filter 把背后的封面图变灰变暗。
       径向遮罩在鼠标(--mx,--my)处挖一个柔和的洞露出原彩色。
       每一段透明度都乘以 --h：不悬停(h=0)→处处不透明→整张灰暗；
       悬停(h=1)→洞张开。h 渐变即"原地淡出/淡入"，不靠缩放半径，
       所以消失时是整团光均匀变暗化没，而非塌缩成一个点。 */
    .card-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      backdrop-filter: grayscale(1) brightness(0.5);
      -webkit-backdrop-filter: grayscale(1) brightness(0.5);
      -webkit-mask: radial-gradient(circle 320px at var(--mx) var(--my),
                      rgba(0,0,0,calc(1 - 1.00*var(--h))) 0%,
                      rgba(0,0,0,calc(1 - 0.92*var(--h))) 26%,
                      rgba(0,0,0,calc(1 - 0.72*var(--h))) 44%,
                      rgba(0,0,0,calc(1 - 0.48*var(--h))) 60%,
                      rgba(0,0,0,calc(1 - 0.26*var(--h))) 74%,
                      rgba(0,0,0,calc(1 - 0.12*var(--h))) 85%,
                      rgba(0,0,0,calc(1 - 0.04*var(--h))) 93%,
                      #000 100%);
      mask: radial-gradient(circle 320px at var(--mx) var(--my),
              rgba(0,0,0,calc(1 - 1.00*var(--h))) 0%,
              rgba(0,0,0,calc(1 - 0.92*var(--h))) 26%,
              rgba(0,0,0,calc(1 - 0.72*var(--h))) 44%,
              rgba(0,0,0,calc(1 - 0.48*var(--h))) 60%,
              rgba(0,0,0,calc(1 - 0.26*var(--h))) 74%,
              rgba(0,0,0,calc(1 - 0.12*var(--h))) 85%,
              rgba(0,0,0,calc(1 - 0.04*var(--h))) 93%,
              #000 100%);
      opacity: var(--cover-gray, 1);   /* 1=灰度层显示；选中时由 JS 补间到 0 显全色 */
    }

    .card-info {
      position: relative;
      min-height: 200px;
      padding: 18px 18px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;   /* 歌曲名+专辑名在毛玻璃区垂直居中 */
      align-items: center;       /* 水平居中 */
      /* 毛玻璃点光源：位置(--mx2,--my2)、悬停系数(--h)、封面主色调(--tint) */
      --mx2: 50%;
      --my2: 50%;
      --h: 0;
      --tint: 255, 255, 255;
    }

    /* 毛玻璃上的点光源：不去色，而是把封面主色调以柔光叠加在玻璃上，
       径向渐变中心跟随鼠标，整体亮度由 --h 控制(离开→淡出，不塌缩)。 */
    .card-info::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      mix-blend-mode: screen;
      opacity: var(--h);
      background: radial-gradient(circle 416px at var(--mx2) var(--my2),
                    rgba(var(--tint), 0.55) 0%,
                    rgba(var(--tint), 0.40) 26%,
                    rgba(var(--tint), 0.24) 44%,
                    rgba(var(--tint), 0.12) 60%,
                    rgba(var(--tint), 0.05) 78%,
                    rgba(var(--tint), 0) 100%);
    }

    .card-info > * { position: relative; width: 100%; }   /* 文字在光斑之上，占满宽度以便居中+截断 */

    .card-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 30px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-artist {
      font-family: 'Cervanttis', cursive;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- 顶部 MV：黑白处理 + 暗层，四周羽化融入黑色背景。
       默认态= 随机 MV 混剪(随机片段、声音渐入渐出)；点击卡片时上层覆盖该卡 MV(静音)，收回淡出。 -->
  <div class="mv-top">
    <video class="mv-video" muted playsinline></video>
    <video class="mv-clip" loop muted playsinline></video>
    <div class="mv-shade"></div>
  </div>

  <div id="stage"></div>

  <!-- 首页搜索：圆弧下方空地正中的纯白闪烁光标(竖线) -->
  <div id="search-caret"></div>

  <!-- 搜索模式：全屏高斯模糊(视频/圆弧仍在动) + 居中大字输入 + 进度 -->
  <div id="search-overlay">
    <input id="search-input" type="text" autocomplete="off" spellcheck="false" maxlength="40">
    <div id="search-thickcaret"></div>
    <span id="search-measure"></span>
    <div id="search-progress"></div>
  </div>

  <!-- 点开卡片后的当前行歌词(SplitText 逐字符进场)，居中卡片下方 -->
  <div id="lyric-split"></div>

  <!-- 卡片模板，JS 据此克隆 -->
  <template id="card-tpl">
    <div class="card-slot">
      <div class="card-hover">
        <div class="card">
          <div class="card-cover">
            <img src="assets/cover.jpg" alt="cover">
          </div>
          <div class="card-info">
            <div class="card-title">National Treasures</div>
            <div class="card-artist">@克里斯R 分享的音乐</div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="lib/gsap.min.js"></script>
  <script>
    const rand = (min, max) => Math.random() * (max - min) + min;

    // 媒体(音频/视频)CDN 前缀：本地开发留空(走相对路径 assets/...)，
    // 部署时设为 R2 公开域名(末尾带/)，如 'https://media.example.com/' 或 'https://pub-xxxx.r2.dev/'。
    // 只作用于 audio/video；封面/歌词/字体随 Pages 一起走相对路径。
    const MEDIA_BASE = '';
    const mediaURL = (p) => MEDIA_BASE + p;

    // 顶部默认 MV = 随机混剪：随机挑一个 MV、随机播一段(14~26s)，到点切下一个；
    // 声音段间渐入渐出、画面切换短暂淡一下，避免硬切。点卡片时此层被静音/盖住，收回后继续。
    (function mvMontage() {
      const v = document.querySelector('.mv-video');
      if (!v) return;
      // 顶部混剪也走网易云在线 MV(经 /ncm/mv 代理)，不打包本地视频
      const POOL = [
        '/ncm/mv?id=34761701','/ncm/mv?id=34706616','/ncm/mv?id=34751385','/ncm/mv?id=34757251',
        '/ncm/mv?id=34729454','/ncm/mv?id=34727733','/ncm/mv?id=22622183','/ncm/mv?id=14690698',
        '/ncm/mv?id=14688686','/ncm/mv?id=14592670','/ncm/mv?id=10907250','/ncm/mv?id=34746338',
        '/ncm/mv?id=34715231','/ncm/mv?id=22781835','/ncm/mv?id=34757741',
      ];
      const VOL = 0.35;                 // 混剪音量(首次交互后才出声)
      const FADE = 1.1;                 // 声音/画面渐变时长(秒)
      let segTimer = null;
      let lastIdx = -1;
      v.muted = true; v.loop = false; v.volume = 0;   // 先静音(浏览器策略)，音量由段落管理

      function pickNext() {
        let i; do { i = Math.floor(Math.random() * POOL.length); } while (POOL.length > 1 && i === lastIdx);
        lastIdx = i;
        return POOL[i];

        hsl2rgbStr((h + st.dh + 360) % 360, Math.max(0.15, Math.min(1, s + st.ds)), Math.max(0.25, Math.min(0.7, l + st.dl))));
      apply();
      bloomTween = gsap.timeline({ repeat: -1, yoyo: true })
        .to(st, { dh: 12, ds: 0.08, dl: 0.06, duration: 5, ease: 'sine.inOut', onUpdate: apply })
        .to(st, { dh: -12, ds: -0.06, dl: -0.05, duration: 5, ease: 'sine.inOut', onUpdate: apply });
    }
    function stopBloom() {
      document.body.classList.remove('tinted');     // 淡出(CSS transition)，回到灰调底
      if (bloomTween) { bloomTween.kill(); bloomTween = null; }
    }

    //  入场时从右侧屏外沿圆弧依次扫入到各自位置；落位后保持静态，
    //  不漂浮、不显示描边。点击某张卡才触发漂浮 + 描边。
    // ───────────────────────────────────────────────────────────
    const CONFIG = {
      max: 20,            // 最多卡片数
      gapPx: 130,         // 相邻卡之间的像素间距
      scale: 1,           // 卡片缩放
      topRatio: 0.44,     // 圆顶(0°,最高卡)中心的纵向位置（占视口高比例）
      radiusRatio: 1.25,  // 圆弧半径占视口高比例（越大越平缓）
      tilt: 1.0,          // 卡片完全径向（垂直于半径）→ 所有卡底边落在同一同心圆弧上
      overflowPx: 160,    // 允许首尾卡超出屏幕边缘的量（px）
      startAngle: 96,     // 入场起始角度（度，右侧屏外）
      speed: 69,          // 入场角速度（度/秒）→ 越小入场越慢
      stagger: 0.12,      // 相邻卡出发的时间差（秒）
    };

    const stage = document.getElementById('stage');
    const tpl = document.getElementById('card-tpl');
    const SLOT_W = 384; // 与 .card-slot 宽度一致

    // 圆的几何参数（随视口变化）
    function circle() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const R = vh * CONFIG.radiusRatio;
      const cx = vw / 2;
      const cy = vh * CONFIG.topRatio + R; // 圆心在最高卡正下方 R 处
      return { cx, cy, R };
    }

    // 给定圆周角度（度，0°=正上方/最高，正=向右），返回卡中心屏幕坐标与倾斜
    function pointAt(angleDeg) {
      const { cx, cy, R } = circle();
      const rad = (angleDeg - 90) * Math.PI / 180; // -90 → 0°指向正上方
      return {
        x: cx + R * Math.cos(rad),
        y: cy + R * Math.sin(rad),
        rot: angleDeg * CONFIG.tilt,
      };
    }

    // 由“卡间距”换算成相邻卡的角度间隔（弧度）：
    // 相邻卡中心弦长 = 卡宽 + 间距，弦长对应的圆心角
    function gapRad() {
      const { R } = circle();
      const centerGap = SLOT_W * CONFIG.scale + CONFIG.gapPx;
      return 2 * Math.asin(Math.min(0.5, centerGap / (2 * R)));
    }

    // 算屏幕能排下几张：以 0° 居中对称铺开，首尾卡允许超出屏幕 overflowPx
    function computeFitCount() {
      const vw = window.innerWidth;
      const { cx, R } = circle();
      const halfW = (SLOT_W * CONFIG.scale) / 2;
      const g = gapRad();
      let n = 1;
      while (n + 1 <= CONFIG.max) {
        const test = n + 1;
        const halfSpan = ((test - 1) / 2) * g;          // 最右卡角度(弧度)
        const edgeCenterX = cx + R * Math.sin(halfSpan); // 最右卡中心 x
        const rightEdge = edgeCenterX + halfW;
        if (rightEdge > vw + CONFIG.overflowPx) break;   // 超出允许量才停
        n = test;
      }
      return n;
    }

    let fitCount = computeFitCount();
    const COVER_COUNT = 20; // 20 首歌(封面/音频/歌词来自网易云 SONGS 表)
    const EXTRA = 2;        // 两侧各多一张缓冲卡，让传送带的“回收跳转”发生在屏外

    // 每张封面的 [歌曲名(标题), 专辑名(小字)]，索引对应 coverN（用 MD5 与命名文件精确比对得出）。
    // 规则：中文名只取英文；某一栏无英文则两栏都填仅有的那个英文。
    const META = {
      1:  ['LET ME LUV U', 'MOSLOS'],
      2:  ['Shoot', 'Rebuild'],
      3:  ['brother hood', 'Born 2 Be'],
      4:  ["O'3300", 'THE OMNI ORACLE'],
      5:  ['SUN DOWN', 'SUN DOWN'],
      6:  ['National Treasures', 'ICEMAN'],
      7:  ['What Can I Say', 'What Can I Say'],   // 咋说（口语，意为“还能说啥”）
      8:  ['MVP', 'Small Town Legend'],
      9:  ['What U Gon Do', 'NESA'],
      10: ['I THINK I FELL IN <3', 'KILL THOME II'],
      11: ['Freestyle', 'Freestyle'],
      12: ['wintry rain', 'wintry rain'],
      13: ['Murder', 'WHOISKIV'],
      14: ['Scared 2 Be Lonely', 'Scared 2 Be Lonely'],
      15: ['Forget it', 'nightfall EP'],
      16: ['CN TOWER', '$ome $exy $ongs 4 U'],
      17: ['Manta', 'Manta'],
      18: ['Colt.45', 'Colt.45'],
      19: ['Myself', 'GUOXIA'],
      20: ['MY BACK', 'mac ova seas'],
    };

    // 提取封面主色调：缩到小图取平均，偏灰/过暗过亮的像素降权，得到鲜明主色。
    // 结果写到该卡 .card-info 的 --tint(供毛玻璃点光源叠加)。复用一个离屏 canvas。
    const _cvs = document.createElement('canvas');
    const _ctx = _cvs.getContext('2d', { willReadFrequently: true });
    const _tintCache = {};
    function applyCover(slotEl, num) {
      slotEl.dataset.cover = num;                       // 封面号存 DOM(音频/MV/歌词据此)
      const img = slotEl.querySelector('.card-cover img');
      // 封面优先用网易云(代理同源)，未预取到则暂用本地 jpg 兜底
      const src = PIC[num] || `assets/cover${num}.jpg`;
      img.src = src;
      const meta = META[num];
      if (meta) {
        slotEl.querySelector('.card-title').textContent = meta[0];
        slotEl.querySelector('.card-artist').textContent = meta[1];
      }
      const info = slotEl.querySelector('.card-info');
      if (_tintCache[src]) { info.style.setProperty('--tint', _tintCache[src]); return; }
      const probe = new Image();
      probe.onload = () => {
        const w = 24, h = 24;
        _cvs.width = w; _cvs.height = h;
        _ctx.drawImage(probe, 0, 0, w, h);
        let data;
        try { data = _ctx.getImageData(0, 0, w, h).data; } catch (e) { return; }
        let r = 0, g = 0, b = 0, wsum = 0;
        for (let i = 0; i < data.length; i += 4) {
          const cr = data[i], cg = data[i + 1], cb = data[i + 2];
          const mx = Math.max(cr, cg, cb), mn = Math.min(cr, cg, cb);
          const sat = mx === 0 ? 0 : (mx - mn) / mx;       // 饱和度
          const lum = (cr + cg + cb) / 3;
          // 偏灰、过暗、过亮的像素降权，突出鲜明主色
          const weight = (0.25 + sat) * (lum > 24 && lum < 235 ? 1 : 0.15);
          r += cr * weight; g += cg * weight; b += cb * weight; wsum += weight;
        }
        if (wsum > 0) {
          const tint = `${Math.round(r / wsum)}, ${Math.round(g / wsum)}, ${Math.round(b / wsum)}`;
          _tintCache[src] = tint;
          info.style.setProperty('--tint', tint);
        }
      };
      probe.src = src;
    }

    const totalCards = Math.min(CONFIG.max, fitCount + EXTRA);
    const slots = [];
    for (let i = 0; i < totalCards; i++) {
      const node = tpl.content.firstElementChild.cloneNode(true);
      stage.appendChild(node);
      // 每张卡用不同封面（循环取用）+ 提取主色调
      applyCover(node, (i % COVER_COUNT) + 1);
      slots.push(node);
    }

    // 第 i 张最终停留角度：以 0° 居中对称铺开
    function finalAngle(i, n) {
      const gapDeg = gapRad() * 180 / Math.PI;
      return (i - (n - 1) / 2) * gapDeg;
    }

    // ───────────────────────────────────────────────────────────
    //  统一模型：入场 + 传送带合为一体，全程不停顿。
    //  传送带从一开始就以恒定速度让整组左移（scroll 持续增长）。
    //  每张卡 = 归属槽位角(base) - scroll + 入场偏移(off)。
    //  off 用 power3.out 从“右侧屏外”衰减到 0：卡滑入后速度平滑收敛到
    //  传送带速度(-C)，而不是收敛到 0 —— 所以卡一进来就并入匀速流，
    //  不必等别人、也没有“全体静止→突然启动”的跳变。丝滑衔接。
    // ───────────────────────────────────────────────────────────
    let scroll = 0;                  // 传送带累计左移量(度)，从 0 持续增长
    let coverCursor = totalCards;    // 初始已用 0..totalCards-1，回收时续号
    const CONVEYOR_SPEED = 1.68;     // 度/秒，缓慢左移

    const HOVER_LIFT = 80;           // 悬停上移(px)
    const HOVER_SCALE = 0.10;        // 悬停放大比例(+10%)
    const MAX_TILT = 14;             // 跟随鼠标的最大 3D 倾斜角(度)

    function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
    function progressOf(cs) { return cs.offStart ? 1 - cs.off / cs.offStart : 1; }  // 入场进度 0→1

    function renderCard(cs) {
      const p = pointAt(cs.base - scroll + cs.off);
      // 入场进度：off 从 offStart 衰减到 0 → progress 0→1。缩放 90%→100% 随之收尾。
      const enterScale = CONFIG.scale * (0.9 + 0.1 * progressOf(cs));

      // 悬停上移：沿卡片自身角度的"上"方向，而非屏幕垂直。
      const liftRad = p.rot * Math.PI / 180;
      const lift = HOVER_LIFT * cs.hoverF;

      // 槽位：圆弧定位 + 径向旋转 + 入场缩放 + 沿自身角度的悬停上移
      gsap.set(cs.slot, {
        xPercent: -50, yPercent: -50,
        left: 0, top: 0,
        x: p.x + Math.sin(liftRad) * lift,
        y: p.y - Math.cos(liftRad) * lift,
        rotation: p.rot,
        scale: enterScale,
      });

      // 悬停层：放大(底部为原点) + 跟随鼠标 3D 倾斜
      gsap.set(cs.hover, {
        scale: 1 + HOVER_SCALE * cs.hoverF,
        rotateX: cs.tiltX,
        rotateY: cs.tiltY,
      });

      // 点光源遮罩：位置随鼠标，h=hoverF 驱动原地淡入淡出(半径固定，不塌缩)
      gsap.set(cs.cover, {
        '--mx': cs.spotX + '%',
        '--my': cs.spotY + '%',
        '--h': cs.hoverF,
      });

      // 毛玻璃点光源：封面主色调柔光，位置随鼠标，亮度由 hoverF 控制
      gsap.set(cs.info, {
        '--mx2': cs.glowX + '%',
        '--my2': cs.glowY + '%',
        '--h': cs.hoverF,
      });
    }

    // base=归属槽位角; off=入场偏移; offStart=偏移初值; hoverF=悬停系数;
    // tiltX/tiltY=当前3D倾斜; tTiltX/tTiltY=倾斜目标值
    const cardState = slots.map((slot, i) => ({
      slot,
      hover: slot.querySelector('.card-hover'),
      cover: slot.querySelector('.card-cover'),
      card: slot.querySelector('.card'),
      info: slot.querySelector('.card-info'),
      base: 0, off: 0, offStart: 1,
      hoverF: 0, tiltX: 0, tiltY: 0, tTiltX: 0, tTiltY: 0, isHover: false,
      spotX: 50, spotY: 50,     // 封面点光源位置(%)
      glowX: 50, glowY: 50,     // 毛玻璃点光源位置(%)
      index: i,
    }));

    // 预取 19 首网易云封面(代理同源)，到手后把卡片从本地兜底图刷成网易云封面
    (function prefetchPics() {
      const ids = Object.keys(SONGS).map(n => SONGS[n].id).join(',');
      fetch(`/ncm/api/song/detail?ids=${ids}`).then(r => r.ok ? r.json() : null).then(j => {
        if (!j || !j.songs) return;
        const byId = {}; j.songs.forEach(s => { byId[s.id] = s; });
        Object.keys(SONGS).forEach(n => {
          const s = byId[SONGS[n].id];
          if (s && s.al && s.al.picUrl) PIC[n] = '/ncm/img?u=' + encodeURIComponent(s.al.picUrl + '?param=512y512');
        });
        // 刷新当前在场卡片的封面(用各自 data-cover)
        cardState.forEach(cs => { const n = +cs.slot.dataset.cover; if (PIC[n]) applyCover(cs.slot, n); });
      }).catch(() => {});
    })();

    // 鼠标位置 + 每帧命中检测（卡片在动，用位置判断谁在鼠标下，而非 enter/leave）
    let mouseX = -1, mouseY = -1;
    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; });

    function updateHover() {
      // 找鼠标正下方的卡（elementFromPoint 返回最上层，正好是视觉可见那张）
      let hoveredSlot = null;
      if (mouseX >= 0) {
        const el = document.elementFromPoint(mouseX, mouseY);
        const slotEl = el && el.closest('.card-slot');
        if (slotEl) hoveredSlot = slotEl;
      }
      cardState.forEach((cs) => {
        const isHover = cs.slot === hoveredSlot;
        // 悬停状态翻转时才启动过渡，避免每帧重复创建 tween
        if (isHover !== cs.isHover) {
          cs.isHover = isHover;
          cs.card.classList.toggle('hovered', isHover);   // 悬停时显示描边动画
          if (isHover) startPreview(false, cs); else stopPreview(); // 悬停播高潮段，移走停
          gsap.to(cs, {
            hoverF: isHover ? 1 : 0,
            duration: isHover ? 0.35 : 0.4,
            ease: 'power2.out',
            overwrite: 'auto',
          });
        }
        if (isHover) {
          // 鼠标相对卡中心的偏移 → 倾斜目标（向鼠标那侧倾）
          const r = cs.slot.getBoundingClientRect();
          const dx = (mouseX - (r.left + r.width / 2)) / (r.width / 2);
          const dy = (mouseY - (r.top + r.height / 2)) / (r.height / 2);
          cs.tTiltY = clamp(dx, -1, 1) * MAX_TILT;   // 鼠标偏右 → 绕Y正向倾
          cs.tTiltX = clamp(-dy, -1, 1) * MAX_TILT;  // 鼠标偏上 → 绕X正向倾
          // 点光源圆心 = 鼠标屏幕位置，换算成各自框的百分比。
          // 不 clamp：圆心可落在框外，于是同一个圆能横跨封面/玻璃接缝，
          // 鼠标在哪侧哪侧亮、另一侧只露出溢出的圆弧 → 看着是一团光。
          const cr = cs.cover.getBoundingClientRect();
          cs.spotX = (mouseX - cr.left) / cr.width * 100;
          cs.spotY = (mouseY - cr.top) / cr.height * 100;
          const ir = cs.info.getBoundingClientRect();
          cs.glowX = (mouseX - ir.left) / ir.width * 100;
          cs.glowY = (mouseY - ir.top) / ir.height * 100;
        } else {
          cs.tTiltX = 0; cs.tTiltY = 0;
        }
      });
    }

    (function initEntrance() {
      const n = cardState.length;
      cardState.forEach((cs, i) => {
        cs.base = finalAngle(i, n);
        cs.off = CONFIG.startAngle - cs.base;   // 起始落在 startAngle(右侧屏外)
        cs.offStart = cs.off;                   // 记录初值，缩放进度据此计算
        renderCard(cs);
        // off 衰减到 0：卡从右侧滑入并入匀速流；power3.out 末速→ -C，连续不停顿
        const dur = Math.max(0.7, Math.abs(cs.off) / CONFIG.speed);
        gsap.to(cs, {
          off: 0,
          duration: dur,
          delay: i * CONFIG.stagger,            // 最左(i=0)先出发，出来即随流移动
          ease: 'power3.out',
        });
      });
    })();

    // 单一渲染循环：传送带始终匀速左移、回收换封面、流动不停。
    //  被选中（居中漂浮）的那张跳过，由 GSAP/漂浮独立驱动；其余卡照常随传送带流动，
    //  即使正在像素消散也继续滑行 —— 循环动画不停。悬停命中仅在 flow 时生效。
    let mode = 'flow';            // 'flow' | 'busy' | 'selected'
    let selectedCS = null;        // 被选中（居中漂浮）的卡
    let returningCS = null;       // 正在飞回传送带的卡（逐帧向实时位置插值）
    let stopSelectedDrift = null; // 选中卡的漂浮停止句柄

    let loopLast = performance.now();
    function frame(now) {
      const dt = (now - loopLast) / 1000;
      loopLast = now;

      scroll += CONVEYOR_SPEED * dt;                    // 始终推进，循环不停
      sampleBeat();                                     // 读节奏能量(驱动倾斜)
      if (mode === 'flow') updateHover();               // 命中检测仅在传送带态

      const n = cardState.length;
      const gapDeg = gapRad() * 180 / Math.PI;
      const period = n * gapDeg;                        // 循环角度周期
      const leftLimit = finalAngle(0, n) - gapDeg * 0.5; // 屏外左侧回收点
      const k = 1 - Math.pow(0.001, dt);

      cardState.forEach((cs) => {
        if (cs === selectedCS) return;                  // 居中漂浮的卡不走传送带
        const angle = cs.base - scroll + cs.off;
        if (cs !== returningCS && angle < leftLimit) {
          cs.base += period;                            // 跳到队尾（右侧屏外）
          applyCover(cs.slot, (coverCursor % COVER_COUNT) + 1); // 换新封面+主色调
          coverCursor++;
        }
        // 倾斜平滑趋近目标（指数插值，帧率无关）
        cs.tiltX += (cs.tTiltX - cs.tiltX) * k;
        cs.tiltY += (cs.tTiltY - cs.tiltY) * k;

        if (cs === returningCS) {
          // 飞回：slot 与 hover 都从“居中起点”向各自归宿用同一 retF 插值，单一缓动、无冲突
          const p = pointAt(cs.base - scroll + cs.off);
          const f = cs.retF, g = 1 - f;
          gsap.set(cs.slot, {
            xPercent: -50, yPercent: -50, left: 0, top: 0,
            x: cs.retFrom.x * g + p.x * f,
            y: cs.retFrom.y * g + p.y * f,
            rotation: cs.retFrom.rot * g + p.rot * f,
            scale: cs.retFrom.scale * g + CONFIG.scale * f,
          });
          const rh = cs.retHover;
          gsap.set(cs.hover, {
            x: rh.x * g, y: rh.y * g,
            rotateX: rh.rx * g, rotateY: rh.ry * g, rotateZ: rh.rz * g,
            scale: rh.scale * g + 1 * f,
          });
        } else {
          renderCard(cs);
        }
      });
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ───────────────────────────────────��───────────────────────
    //  点击交互：点某张卡 → 它飞到屏幕中央接上无规则漂浮，其余卡像素消散。
    //  再次点击（中间那张/任意处）→ 其余卡像素聚拢复原，中间卡飞回传送带。
    // ───────────────────────────────────────────────────────────
    function clearAllHover() {
      cardState.forEach((cs) => {
        cs.isHover = false;
        cs.card.classList.remove('hovered');
        gsap.to(cs, { hoverF: 0, duration: 0.25, overwrite: 'auto' });
        cs.tTiltX = 0; cs.tTiltY = 0;
      });
    }

    function select(cs) {
      if (mode !== 'flow') return;
      mode = 'busy';
      selectedCS = cs;
      clearAllHover();
      searchCaret.classList.add('hide');     // 播放页隐藏首页搜索光标

      // 1) 被选中卡：飞到屏幕中央、正过来、放大；落定后接上漂浮 + 描边
      cs.card.classList.add('playing');
      fadeCoverGray(cs, 0);                  // 封面平滑显全色
      // 底部渐变切到该卡主色调(同色系缓慢变化)；描边保持白色不变
      const tint = (getComputedStyle(cs.info).getPropertyValue('--tint') || '255,255,255').trim();
      startBloom(tint);
      startPreview(true, cs);                // 点开→从头完整播放整首(节奏驱动倾斜)
      showClipMV(cs);                         // 顶部覆盖该卡 MV(静音)
      showLyrics(coverNumOf(cs));             // 卡片下方显示当前行歌词(ASCII 波动)
      // 点光源(--h)只由 renderCard 写，选中后 renderCard 不再跑 → 会冻在点击时的值。
      // 这里显式把它平滑归零，避免返回时残留的光斑“洞”突然闭合造成卡顿。
      gsap.to([cs.cover, cs.info], { '--h': 0, duration: 0.4, ease: 'power2.out' });
      cs.slot.style.zIndex = '100';          // 升到最高层，飞行/居中时不被邻卡盖住
      gsap.killTweensOf(cs);                 // 停掉它残留的入场/悬停 tween
      // 漂浮在飞行途中就启动(作用于 hover 层)，到中心时已在运动 → 与飞入无缝衔接、不停顿
      if (stopSelectedDrift) stopSelectedDrift();
      stopSelectedDrift = startDrift(cs.hover);
      gsap.to(cs.slot, {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        rotation: 0,
        scale: CONFIG.scale * 1.18,
        duration: 0.9,
        ease: 'power2.out',                  // 末段平缓收尾，不急停
        onComplete: () => { mode = 'selected'; },
      });

      // 2) 其余卡：原地模糊 + 淡出（弥散模糊消失）
      cardState.forEach((other) => {
        if (other === cs) return;
        dissolveCard(other, () => { other.slot.style.visibility = 'hidden'; });
      });
    }

    function returnToFlow() {
      if (mode !== 'selected') return;
      mode = 'busy';
      const cs = selectedCS;
      selectedCS = null;              // 立刻交给 returningCS 接管插值，否则 frame 会整段跳过它→冻在中心后突变

      // 停漂浮（记录 hover 当前漂浮位移/旋转作为插值起点，逐帧归零，避免和 set 冲突）
      if (stopSelectedDrift) { stopSelectedDrift(); stopSelectedDrift = null; }
      gsap.killTweensOf(cs.hover);
      cs.retHover = {
        x: +gsap.getProperty(cs.hover, 'x'),
        y: +gsap.getProperty(cs.hover, 'y'),
        rx: +gsap.getProperty(cs.hover, 'rotateX'),
        ry: +gsap.getProperty(cs.hover, 'rotateY'),
        rz: +gsap.getProperty(cs.hover, 'rotateZ'),
        scale: +gsap.getProperty(cs.hover, 'scale'),
      };
      cs.hoverF = 0; cs.tiltX = 0; cs.tiltY = 0; cs.tTiltX = 0; cs.tTiltY = 0;

      // base 归位到可见带内（选中期间 scroll 一直涨而 base 没动）
      const nn = cardState.length;
      const gapDeg2 = gapRad() * 180 / Math.PI;
      const period2 = nn * gapDeg2;
      const leftLimit2 = finalAngle(0, nn) - gapDeg2 * 0.5;
      while (cs.base - scroll + cs.off < leftLimit2) cs.base += period2;

      // 记录当前(居中)变换作为起点，逐帧向“实时传送带位置”插值 → 收尾与 renderCard 完全一致，无跳变
      gsap.killTweensOf(cs.slot);
      cs.retFrom = {
        x: +gsap.getProperty(cs.slot, 'x'),
        y: +gsap.getProperty(cs.slot, 'y'),
        rot: +gsap.getProperty(cs.slot, 'rotation'),
        scale: +gsap.getProperty(cs.slot, 'scale'),
      };
      cs.retF = 0;
      returningCS = cs;
      cs.card.classList.remove('playing');
      fadeCoverGray(cs, 1);                  // 封面平滑变回灰度
      stopBloom();                           // 底部渐变淡回灰调
      stopPreview();                         // 停止高潮预览
      hideClipMV();                          // 顶部 MV 淡出 → 露出默认视频(从上次位置续播)
      hideLyrics();                          // 歌词淡出
      gsap.to(cs, {
        retF: 1, duration: 0.7, ease: 'power2.inOut',
        onComplete: () => {
          cs.slot.style.zIndex = '';         // 还原层级
          returningCS = null;
          mode = 'flow';
          searchCaret.classList.remove('hide');   // 返回首页重新显示搜索光标
        },
      });

      // 其余卡：恢复可见 + 从模糊中聚焦显现
      cardState.forEach((other) => {
        if (other === cs) return;
        other.slot.style.visibility = '';
        reformCard(other);
      });
    }

    window.addEventListener('click', (e) => {
      if (searchMode) return;                           // 搜索模式下忽略卡片选择
      if (mode === 'selected') { returnToFlow(); return; }
      if (mode !== 'flow') return;
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const slotEl = el && el.closest('.card-slot');
      if (!slotEl) return;
      const cs = cardState.find((c) => c.slot === slotEl);
      if (cs) select(cs);
    });

    // ── 搜索模式：点光标→全屏高斯模糊+大字输入(视频/圆弧仍在动)；ESC 退出 ──
    let searchMode = false;
    const searchCaret = document.getElementById('search-caret');
    const searchOverlay = document.getElementById('search-overlay');
    const searchInput = document.getElementById('search-input');
    const searchProgress = document.getElementById('search-progress');
    const thickCaret = document.getElementById('search-thickcaret');
    const searchMeasure = document.getElementById('search-measure');
    let searching = false;

    // 自定义粗光标：测量已输入文字宽度，定位到文字末尾(输入框居中对齐)
    function placeThickCaret() {
      searchMeasure.textContent = searchInput.value || '';
      const tw = searchMeasure.offsetWidth;
      const r = searchInput.getBoundingClientRect();
      const cx = r.left + r.width / 2;                 // 居中对齐 → 文字中心=框中心
      const x = cx + tw / 2 + 6;                       // 末尾再留点缝
      const h = r.height * 0.74;
      thickCaret.style.left = x + 'px';
      thickCaret.style.top = (r.top + r.height / 2 - h / 2) + 'px';
      thickCaret.style.height = h + 'px';
    }

    function enterSearch() {
      if (searchMode) return;
      searchMode = true; searching = false;
      searchOverlay.classList.add('on');
      searchInput.value = '';
      searchProgress.textContent = '';
      setTimeout(() => { searchInput.focus(); placeThickCaret(); }, 50);
    }
    function exitSearch() {
      if (!searchMode) return;
      searchMode = false;
      searchOverlay.classList.remove('on');
      searchInput.blur();
    }

    searchCaret.addEventListener('click', (e) => { e.stopPropagation(); enterSearch(); });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && searchMode) exitSearch(); });
    // 点击空白(覆盖层本身, 非输入框/进度/光标)→ 退出搜索
    searchOverlay.addEventListener('click', (e) => {
      if (e.target === searchOverlay) { e.stopPropagation(); exitSearch(); }
    });
    searchInput.addEventListener('input', placeThickCaret);
    searchInput.addEventListener('keyup', placeThickCaret);
    searchInput.addEventListener('click', placeThickCaret);
    window.addEventListener('resize', () => { if (searchMode) placeThickCaret(); });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const q = searchInput.value.trim();
        if (q && !searching) runSearch(q);
      }
    });

    // 搜索保留号：搜到的歌临时注册到 999，复用现成的 select() 播放机制
    const SEARCH_NUM = 999;
    let progTween = null;
    function setProgress(to, dur) {
      const o = { v: parseInt(searchProgress.textContent) || 0 };
      if (progTween) progTween.kill();
      progTween = gsap.to(o, {
        v: to, duration: dur || 0.5, ease: 'power1.out',
        onUpdate: () => { searchProgress.textContent = Math.round(o.v) + '%'; },
      });
    }

    async function runSearch(q) {
      searching = true;
      searchProgress.textContent = '0%';
      setProgress(15, 0.4);
      try {
        // 1) 搜索取第一首
        const sr = await fetch('/ncm/api/cloudsearch?keywords=' + encodeURIComponent(q) + '&limit=1&type=1');
        const sj = await sr.json();
        const song = sj && sj.result && sj.result.songs && sj.result.songs[0];
        if (!song) { searchProgress.textContent = '没找到'; searching = false; return; }
        setProgress(45, 0.5);
        const id = song.id;
        const name = song.name || q;
        const arr = (song.ar || song.artists || []);
        const artist = arr.map(a => a.name).join(' / ') || '';
        const picUrl = (song.al || song.album || {}).picUrl || '';

        // 2) 注册到保留号 999；MV 按第一歌手名搜网易云 MV(type=1004)随机一支
        SONGS[SEARCH_NUM] = { id, start: 0, end: 30 };
        META[SEARCH_NUM] = [name, artist];
        PIC[SEARCH_NUM] = picUrl ? ('/ncm/img?u=' + encodeURIComponent(picUrl)) : ('assets/cover1.jpg');
        const artist0 = (arr[0] && arr[0].name) || artist || name;
        let mvids = [];
        try {
          const mr = await fetch('/ncm/api/cloudsearch?keywords=' + encodeURIComponent(artist0) + '&limit=12&type=1004');
          const mj = await mr.json();
          mvids = ((mj && mj.result && (mj.result.mvs || mj.result.videos)) || []).map(v => v.id || v.vid).filter(Boolean);
        } catch (e) {}
        if (!mvids.length && (song.mv || song.mvid)) mvids = [song.mv || song.mvid];
        MV_POOL[SEARCH_NUM] = mvids;

        // 3) 预拉歌词 + 封面，进度爬升
        await fetch('/ncm/api/lyric?id=' + id).catch(() => {});
        setProgress(72, 0.5);
        if (picUrl) { await new Promise(res => { const im = new Image(); im.onload = im.onerror = res; im.src = PIC[SEARCH_NUM]; }); }
        setProgress(90, 0.4);

        // 4) 劫持一张当前最靠中间的卡，换成搜到的歌，复用 select() 飞到中央播放
        let best = null, bestA = 1e9;
        cardState.forEach((cs) => {
          const a = Math.abs(cs.base - scroll + cs.off);
          if (a < bestA) { bestA = a; best = cs; }
        });
        applyCover(best.slot, SEARCH_NUM);
        setProgress(100, 0.35);
        setTimeout(() => {
          exitSearch();
          searching = false;
          if (mode === 'flow') select(best);
        }, 420);
      } catch (e) {
        searchProgress.textContent = '搜索出错';
        searching = false;
      }
    }

    // 窗口尺寸变化时按当前角度即时归位（不重播入场；数量变化暂不重建）
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        cardState.forEach(renderCard);
      }, 150);
    });
  </script>
</body>
</html>
